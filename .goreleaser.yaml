version: 2

project_name: gren

before:
  hooks:
    - go mod tidy

builds:
  - id: gren
    main: .
    binary: gren
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - linux_arm
      - linux_386
      - windows_amd64
      - windows_arm64
      - windows_386

archives:
  - ids:
      - gren
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

brews:
  - repository:
      owner: langtind
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/langtind/gren"
    description: "Git worktree manager with TUI and CLI"
    license: "MIT"
    custom_block: |
      head "https://github.com/langtind/gren.git", branch: "main"

      head do
        depends_on "go" => :build
      end
    install: |
      if build.head?
        ldflags = %W[
          -s -w
          -X main.version=HEAD-#{Utils.git_short_head}
          -X main.commit=#{Utils.git_short_head}
          -X main.date=#{time.iso8601}
        ]
        system "go", "build", *std_go_args(ldflags:)
      else
        bin.install "gren"
      end
    caveats: |
      Navigation functionality requires shell integration.

      Add one of these lines to your shell config:

        # Zsh (~/.zshrc):
        eval "$(gren shell-init zsh)"

        # Bash (~/.bashrc):
        eval "$(gren shell-init bash)"

        # Fish (~/.config/fish/config.fish):
        gren shell-init fish | source

      This enables:
        - 'g' key in TUI to navigate to worktree folder
        - 'gcd <name>' alias for quick navigation
        - 'gren navigate <name>' command
    test: |
      assert_match "gren version", shell_output("#{bin}/gren --version")
      assert_match "gren()", shell_output("#{bin}/gren shell-init zsh")
